name: thaishield_ai
description: "ThaiShield AI - Travel Safety Companion"
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.6
  google_maps_flutter: ^2.10.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
